{% extends "layout.html" %}
{% load static %}

{% block content %}
<div class="col-12">
    <div class="card">
        <div class="card-header">
            <h3 class="card-title">{{title}}</h3>
        </div>
        <!-- <div class="card-body border-bottom py-3">
            <div class="d-flex">
                <div class="col-6 col-sm-4 col-md-2 col-xl-1 py-3">
                    <a href="#" class="btn btn-danger w-100">批量删除</a>
                </div>
            </div>
        </div> -->
        <div class="table-responsive">
            <table class="table card-table table-vcenter text-nowrap datatable">
                <thead>
                    <tr>
                        <th class="w-1"><input class="form-check-input m-0 align-middle" type="checkbox"
                                aria-label="Select all invoices"></th>
                        <th>员工姓名</th>
                        <th>所属部门</th>
                        <th>权限</th>
                        <th>创建日期</th>
                        <th>线索总量</th>
                        <th>成交</th>
                        <th>跟进中</th>
                        <th>回退公海</th>
                        <th>上级</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><input class="form-check-input m-0 align-middle" type="checkbox"
                                aria-label="Select invoice"></td>
                        <td><span class="text-secondary">管长虹</span></td>
                        <td><a href="tel:13855556689" class="text-reset" tabindex="-1">昕惠普</a></td>
                        <td>普通员工</td>
                        <td>2025-02-01</td>
                        <td>125条</td>
                        <td>20条</td>
                        <td>128条</td>
                        <td>220条</td>
                        <td><span class="badge bg-success me-1"></span> 沈总</td>
                        <td>正常</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="card-footer d-flex align-items-center">
            <p class="m-0 text-secondary">共查询到180条纪录</p>
            <ul class="pagination m-0 ms-auto">
                <li class="page-item disabled">
                    <a class="page-link" href="#" tabindex="-1" aria-disabled="true">
                        <!-- Download SVG icon from http://tabler-icons.io/i/chevron-left -->
                        <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24"
                            stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round"
                            stroke-linejoin="round">
                            <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
                            <path d="M15 6l-6 6l6 6"></path>
                        </svg>上一页</a>
                </li>
                <li class="page-item"><a class="page-link" href="#">1</a></li>
                <li class="page-item active"><a class="page-link" href="#">2</a></li>
                <li class="page-item"><a class="page-link" href="#">3</a></li>
                <li class="page-item"><a class="page-link" href="#">4</a></li>
                <li class="page-item"><a class="page-link" href="#">5</a></li>
                <li class="page-item">
                    <a class="page-link"
                        href="#">下一页<!-- Download SVG icon from http://tabler-icons.io/i/chevron-right -->
                        <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24"
                            stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round"
                            stroke-linejoin="round">
                            <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
                            <path d="M9 6l6 6l-6 6"></path>
                        </svg>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</div>
{% endblock %}
