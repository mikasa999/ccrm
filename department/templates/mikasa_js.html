<script>
    // 异步加载部门数据
    function loadDepartmentData() {
        fetch('{% url "department:get_department_data" %}')
           .then(response => response.json())
           .then(data => {
                const tableBody = document.getElementById('department-table-body');
                tableBody.innerHTML = ''; // 清空表格内容
                data.departments.forEach(department => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><input class="form-check-input m-0 align-middle" type="checkbox" aria-label="Select invoice"></td>
                        <td>${department.department_name}</td>
                        <td>${department.department_code}</td>
                        <td><a href="#" data-bs-toggle="modal" data-bs-target="#modal-update-department" onclick="prepareUpdateModal(${department.id}, '${department.department_name}', '${department.department_code}')"><i class="ti ti-edit"></i></a></td>
                        <td><a href="#" onclick="deleteDepartment(${department.id})"><i style="color:red;" class="ti ti-archive"></i></a></td>
                    `;
                    tableBody.appendChild(row);
                });
            })
           .catch(error => console.error('Error:', error));
    }

    // 页面加载完成后执行异步加载
    window.addEventListener('load', loadDepartmentData);

    // 准备修改模态框
    function prepareUpdateModal(id, department_name, department_code) {
        const modal = document.getElementById('modal-update-department');
        const departmentNameInput = modal.querySelector('#update-department-name');
        const departmentCodeInput = modal.querySelector('#update-department-code');
        const departmentIdInput = modal.querySelector('#update-department-id');

        departmentNameInput.value = department_name;
        departmentCodeInput.value = department_code;
        departmentIdInput.value = id;
    }

    // 添加部门
    function addDepartment() {
        const departmentName = document.getElementById('add-department-name').value;
        const departmentCode = document.getElementById('add-department-code').value;

        fetch('{% url "department:add_department" %}', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify({
                'department_name': departmentName,
                'department_code': departmentCode
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 'success') {
                // 关闭模态框
                const modal = document.getElementById('modal-report-add');
                const modalInstance = bootstrap.Modal.getInstance(modal);
                modalInstance.hide();
                // 刷新部门数据
                loadDepartmentData();
            } else {
                alert('添加失败：' + data.message);
            }
        })
        .catch(error => console.error('Error:', error));
    }

    // 修改部门
    function updateDepartment() {
        const departmentId = document.getElementById('update-department-id').value;
        const departmentName = document.getElementById('update-department-name').value;
        const departmentCode = document.getElementById('update-department-code').value;

        fetch(`{% url "department:update_department" 0 %}`.replace('0', departmentId), {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify({
                'department_name': departmentName,
                'department_code': departmentCode
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 'success') {
                // 关闭模态框
                const modal = document.getElementById('modal-update-department');
                const modalInstance = bootstrap.Modal.getInstance(modal);
                modalInstance.hide();
                // 刷新部门数据
                loadDepartmentData();
            } else {
                alert('修改失败：' + data.message);
            }
        })
        .catch(error => console.error('Error:', error));
    }

    // 删除部门
    function deleteDepartment(departmentId) {
        if (confirm('确定要删除该部门吗？')) {
            fetch(`{% url "department:delete_department" 0 %}`.replace('0', departmentId), {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    // 刷新部门数据
                    loadDepartmentData();
                } else {
                    alert('删除失败：' + data.message);
                }
            })
            .catch(error => console.error('Error:', error));
        }
    }

    // 获取 CSRF Token
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie!== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>
