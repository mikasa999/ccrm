<form id="department_add_form" action="{% url 'department:department_add' %}" method="post">
  {% csrf_token %}
<div class="modal modal-blur fade" id="modal-report" tabindex="-1" role="dialog" aria-hidden="true">
  <div class="modal-dialog modal-lg" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">新增{{ page_heading }}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="row">
          <div class="col-lg-6">
            <div class="mb-3">
              <label class="form-label">部门</label>
              <input type="text" name="department_name" class="form-control">
            </div>
          </div>
          <div class="col-lg-6">
            <div class="mb-3">
              <label class="form-label">部门编码</label>
              <input type="text" name="department_code" class="form-control">
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <a href="#" class="btn btn-link link-secondary" data-bs-dismiss="modal">
          退出
        </a>
        <button type="button" id="submit_button" class="btn btn-primary ms-auto" data-bs-dismiss="modal">
          提交
        </button>
      </div>
    </div>
  </div>
</div>
</form>

<!--异步提交-->
<script>
    $(document).ready(function () {
        // 给提交按钮绑定点击事件
        $('#submit_button').click(function () {
            // 获取表单数据
            var formData = $('#department_add_form').serialize();
            // 获取 CSRF 令牌
            var csrftoken = $('input[name=csrfmiddlewaretoken]').val();

            // 发起 AJAX 请求
            $.ajax({
                url: "{% url 'department:department_add' %}",
                type: 'POST',
                data: formData,
                headers: {
                    'X-CSRFToken': csrftoken
                },
                success: function (response) {
                    // 请求成功时的处理逻辑
                    alert('部门添加成功！');
                    // 可以在这里添加更多逻辑，比如刷新列表等
                },
                error: function (error) {
                    // 请求失败时的处理逻辑
                    alert('部门添加失败：' + error.responseJSON.message);
                }
            });
        });
    });
</script>
