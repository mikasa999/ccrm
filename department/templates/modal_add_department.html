<form id="department_add_form" action="{% url 'department:department_add' %}" method="post">
  {% csrf_token %}
<div class="modal modal-blur fade" id="modal-report" tabindex="-1" role="dialog" aria-hidden="true">
  <div class="modal-dialog modal-lg" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">新增{{ page_heading }}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="row">
          <div class="col-lg-6">
            <div class="mb-3">
              <label class="form-label">部门</label>
              <input type="text" name="department_name" class="form-control">
            </div>
          </div>
          <div class="col-lg-6">
            <div class="mb-3">
              <label class="form-label">部门编码</label>
              <input type="text" name="department_code" class="form-control">
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <a href="#" class="btn btn-link link-secondary" data-bs-dismiss="modal">
          退出
        </a>
        <button type="submit" class="btn btn-primary ms-auto" data-bs-dismiss="modal">
          提交
        </button>
      </div>
    </div>
  </div>
</div>
</form>
